<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 For M</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:tahoma;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    overflow:hidden;
}

.box{
    text-align:center;
    z-index:2;
}

h1,h2{
    color:white;
}

button, input{
    padding:12px 20px;
    font-size:16px;
    border:none;
    border-radius:10px;
    margin:8px;
}

#yes{
    background:#2ecc71;
    color:white;
}

#no{
    background:#e74c3c;
    color:white;
    position:absolute;
}

input{
    width:220px;
}

/* قلب‌ها */
.heart{
    position:absolute;
    color:white;
    font-size:20px;
    animation:floatUp 4s linear forwards;
    opacity:0.8;
}

@keyframes floatUp{
    from{transform:translateY(100vh);}
    to{transform:translateY(-10vh); opacity:0;}
}

/* امضا */
.signature{
    position:fixed;
    bottom:12px;
    right:12px;
    color:white;
    font-size:16px;
    font-weight:500;
    animation: glow 1.5s infinite alternate;
}

@keyframes glow{
    from{
        text-shadow: 0 0 5px #fff, 0 0 10px #ff4da6, 0 0 15px #ff4da6;
    }
    to{
        text-shadow: 0 0 10px #fff, 0 0 20px #ff1a75, 0 0 30px #ff1a75;
    }
}
</style>
</head>

<body>

<!-- صفحه اول -->
<div class="box" id="main">
    <h1 id="text">Will you go out with me? :)</h1>
    <button id="yes">Of course yeah 😏</button>
    <button id="no">No</button>
</div>

<!-- فرم -->
<div class="box" id="formBox" style="display:none;">
    <h2>شماره و تایم رو بده 😌</h2>

    <form action="https://formsubmit.co/samimohamadi1387@gmail.com" method="POST">

        <input type="hidden" name="_captcha" value="false">

        <input name="phone" placeholder="شماره 📱" required>
        <br>
        <input name="time" placeholder="کی تایمت آزاده ⏰" required>
        <br>

        <button type="submit" style="background:#2ecc71;color:white;">
            ارسال ❤️
        </button>
    </form>
</div>

<div class="signature">for M</div>

<script>
const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const text = document.getElementById("text");
const main = document.getElementById("main");
const formBox = document.getElementById("formBox");

let noTexts = ["No","Really? 🥺","Think again 😂","Come on 😏"];
let i = 0;

// فرار دکمه No
noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 100);
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    noBtn.innerText = noTexts[i % noTexts.length];
    i++;
});

// Yes کلیک
yesBtn.addEventListener("click", () => {
    text.innerHTML = "";

    typeWriter("هوراا قبول کردی فسقلی 😏❤️", 0);

    for(let i=0;i<60;i++){
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤️";
        heart.style.left = Math.random()*100 + "vw";
        heart.style.animationDuration = (2+Math.random()*3) + "s";
        document.body.appendChild(heart);
    }

    setTimeout(()=>{
        main.style.display = "none";
        formBox.style.display = "block";
    }, 2500);
});

// تایپ
function typeWriter(txt, i){
    if(i < txt.length){
        text.innerHTML += txt.charAt(i);
        setTimeout(()=>typeWriter(txt, i+1), 70);
    }
}
</script>

</body>
</html>
