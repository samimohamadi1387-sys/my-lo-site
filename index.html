<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study 💖</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:tahoma;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    overflow:hidden;
}

.box{
    text-align:center;
}

h1,h2{
    color:white;
}

button{
    padding:14px 28px;
    font-size:18px;
    border:none;
    border-radius:12px;
    margin:10px;
    cursor:pointer;
}

#ok{
    background:#2ecc71;
    color:white;
}

#no{
    background:#e74c3c;
    color:white;
    position:absolute;
}

input{
    width:240px;
    padding:10px;
    border:none;
    border-radius:10px;
    margin:8px;
}

/* امضا */
.signature{
    position:fixed;
    bottom:12px;
    right:12px;
    color:white;
    font-size:16px;
    font-weight:600;
    animation: glow 1.5s infinite alternate;
}

@keyframes glow{
    from{
        text-shadow:0 0 5px #fff, 0 0 10px #ff4da6;
    }
    to{
        text-shadow:0 0 20px #ff1a75;
    }
}
</style>
</head>

<body>

<!-- صفحه اول -->
<div class="box" id="main">
    <h1>Let’s study together 📚</h1>

    <button id="ok">OK 😏</button>
    <button id="no">No</button>
</div>

<!-- صفحه دوم -->
<div class="box" id="formBox" style="display:none;">
    <h2>Your number is not needed, just tell me the date 😏📅</h2>

    <form action="https://formsubmit.co/samimohamadi1387@gmail.com" method="POST">

        <input type="hidden" name="_captcha" value="false">

        <input name="date" placeholder="Date 📅" required>
        <br>

        <button type="submit" style="background:#2ecc71;color:white;">
            Send ❤️
        </button>
    </form>
</div>

<div class="signature">for M</div>

<script>
const okBtn = document.getElementById("ok");
const noBtn = document.getElementById("no");

const main = document.getElementById("main");
const formBox = document.getElementById("formBox");

// دکمه No فرار کنه 😂
noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 100);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});

// دکمه OK ✔ (حل مشکل اصلی)
okBtn.addEventListener("click", () => {
    main.style.display = "none";
    formBox.style.display = "block";
});
</script>

</body>
</html>
